name: Tests

permissions:
    contents: write
on:
    push:
        branches: [ master ]
    pull_request:
        branches: [ master ]

jobs:
    Linux:
        runs-on: ubuntu-24.04
        name: Ubuntu 24.04
        steps:
            -   name: 💖 Install Swift 💖
                uses: rarestype/swift-install-action@master
                with:
                    swift-prefix: "swift-6.2.4-release/ubuntu2404/swift-6.2.4-RELEASE"
                    swift-id: "swift-6.2.4-RELEASE-ubuntu24.04"

            -   name: 💖 Checkout repository 💖
                uses: actions/checkout@v6

            -   name: 💖 Run tests 💖
                run: Scripts/TestAll

            -   name: 💖 Publish Status Badge 💖
                uses: rarestype/rarestbadge@v1
                if: always()

    macOS:
        runs-on: macos-26
        steps:
            -   name: 💖 Checkout repository 💖
                uses: actions/checkout@v6

            -   name: 💖 Select Xcode 26.3 💖
                run: sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer

            -   name: 💖 Run tests 💖
                run: Scripts/TestAll

            -   name: 💖 Publish Status Badge 💖
                uses: rarestype/rarestbadge@v1
                if: always()
