name: "Generate and Publish Badge"
description: "Generates a status badge and pushes it to a ghost ref"
inputs:
    badge:
        description: "Unique identifier for this badge"
        required: true
    title:
        description: "Custom text to display on the left side of the badge"
        required: false

runs:
    using: "composite"
    steps:
        -   name: Interpret status
            id: status
            shell: bash
            run: |
                if [[ "${{ github.ref }}" != "refs/heads/${{ github.event.repository.default_branch }}" ]]; then
                    echo "status=none" >> $GITHUB_OUTPUT
                    echo "Skipping badge generation: Not on the default branch."
                elif [[ "${{ job.status }}" == "success" ]]; then
                    echo "status=passing" >> $GITHUB_OUTPUT
                else
                    echo "status=failing" >> $GITHUB_OUTPUT
                fi

        -   name: Create badge
            shell: bash
            if: steps.status.outputs.status != 'none'
            run: |
                "${{ github.action_path }}/Scripts/RenderBadge" \
                    "${{ github.action_path }}/Resources/badge.svg.template" \
                    "${{ inputs.title || inputs.badge }}" \
                    "${{ steps.status.outputs.status }}"

        -   name: Create ghost ref
            shell: bash
            if: steps.status.outputs.status != 'none'
            run: |
                # Work in a temporary directory to avoid touching the main workspace tree
                mkdir -p /tmp/badge-publish
                cd /tmp/badge-publish

                # Initialize an empty git repo
                git init --quiet

                git config user.name "rarest automation"
                git config user.email "automation@noreply.rarestype.com"

                # Copy the generated badge to the root of this orphan branch
                cp $GITHUB_WORKSPACE/badge.svg status.svg

                git add status.svg
                git commit -m "update badge: ${{ inputs.badge }} (${{ steps.status.outputs.status }})"

                # Force push using the provided token
                git push --force \
                    https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git \
                    HEAD:refs/badges/ci/${{ inputs.badge }}
